name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node Dependencies
        run: |
          npm install --legacy-peer-deps || echo "No npm deps to install"

      - name: Grant Execute Permission
        run: find . -name "gradlew" -exec chmod +x {} +

      - name: Build with Gradle (Auto-Detect Path)
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleRelease
          elif [ -d "./android" ]; then
            cd android && ./gradlew assembleRelease
          elif [ -d "./app" ]; then
            cd app && ./gradlew assembleRelease
          else
            echo "Cannot find gradlew or android folder"; exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneClaw-Final
          path: "**/*.apk"

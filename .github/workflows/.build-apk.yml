name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install --legacy-peer-deps || echo "No npm deps"

      - name: Clean and Build Debug APK
        run: |
          # Cấp quyền thực thi tuyệt đối
          chmod -R +x .
          find . -name "gradlew" -exec chmod +x {} +
          
          # Thiết lập bộ nhớ thấp để tránh crash máy chủ GitHub
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"
          
          # Chạy lệnh dọn dẹp trước khi build bản Debug
          if [ -d "./android" ]; then
            cd android
            ./gradlew clean
            ./gradlew assembleDebug --no-daemon -x test -x lint
          else
            ./gradlew clean
            ./gradlew assembleDebug --no-daemon -x test -x lint
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneClaw-Debug-App
          path: "**/*.apk"

name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node Dependencies
        run: npm install --legacy-peer-deps || echo "No npm deps"

      - name: Build with Gradle (Low Memory Mode)
        run: |
          find . -name "gradlew" -exec chmod +x {} +
          # Chạy build với giới hạn bộ nhớ để không bị crash máy chủ GitHub
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"
          if [ -d "./android" ]; then
            cd android && ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleRelease --no-daemon
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneClaw-Final
          path: "**/*.apk"

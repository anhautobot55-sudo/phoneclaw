name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Fix Permissions and Build
        run: |
          # Tìm và cấp quyền thực thi cho tất cả file gradlew trong dự án
          find . -name "gradlew" -exec chmod +x {} +
          # Chạy lệnh build trực tiếp từ thư mục gốc
          ./gradlew assembleRelease || (cd android && ./gradlew assembleRelease)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneClaw-Release
          path: "**/*.apk" # Tìm tất cả file apk được tạo ra trong bất kỳ thư mục nào
